<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafiquitos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .tab-active {
            border-bottom: 4px solid #3b82f6;
            color: #1e3a8a;
            font-weight: 700;
        }

        .tab-inactive {
            color: #64748b;
            font-weight: 600;
        }

        .tab-inactive:hover {
            color: #3b82f6;
        }

        /* Hide scrollbar for horizontal scrolling tabs */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }

        .tab-inactive,
        .tab-active {
            white-space: nowrap;
            /* Prevent text wrapping in tabs */
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white shadow-sm border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div
                class="flex flex-col sm:flex-row justify-between items-center pt-3 pb-1 sm:py-0 sm:h-16 gap-3 sm:gap-0 border-b border-slate-200">
                <!-- Logo -->
                <div class="flex-shrink-0 flex items-center gap-2 w-full sm:w-auto justify-center sm:justify-start">
                    <div
                        class="w-10 h-10 rounded-full overflow-hidden shadow-sm border-2 border-slate-100 flex items-center justify-center bg-white flex-shrink-0">
                        <img src="img/imagen_perfil_sin_nombre_recortada.jpeg" alt="Grafiquitos Logo"
                            class="w-full h-full object-cover" />
                    </div>
                    <span class="font-bold text-2xl text-slate-800 tracking-tight">Grafiquitos</span>
                </div>

                <!-- Navigation Tabs -->
                <nav
                    class="flex w-full sm:w-auto sm:ml-6 space-x-6 sm:space-x-8 px-2 sm:px-0 h-12 sm:h-16 overflow-x-auto scrollbar-hide items-end sm:items-center border-none">
                    <button onclick="changeTab('economia')" id="tab-economia"
                        class="tab-inactive inline-flex items-center px-1 pb-2 sm:pt-1 sm:pb-0 text-sm transition-colors duration-200">
                        Economía
                    </button>

                    <button onclick="changeTab('mercado-laboral')" id="tab-mercado-laboral"
                        class="tab-active inline-flex items-center px-1 pb-2 sm:pt-1 sm:pb-0 text-sm transition-colors duration-200">
                        Mercado Laboral
                    </button>

                    <button onclick="changeTab('puestos-demandados')" id="tab-puestos-demandados"
                        class="tab-inactive inline-flex items-center px-1 pb-2 sm:pt-1 sm:pb-0 text-sm transition-colors duration-200">
                        Puestos demandados
                    </button>
                    <!-- <button onclick="changeTab('tecnologia')" id="tab-tecnologia"
                        class="tab-inactive inline-flex items-center px-1 pb-2 sm:pt-1 sm:pb-0 text-sm transition-colors duration-200">
                        Tecnología
                    </button> -->
                    <!-- <button onclick="changeTab('politica')" id="tab-politica"
                        class="tab-inactive inline-flex items-center px-1 pb-2 sm:pt-1 sm:pb-0 text-sm transition-colors duration-200">
                        Política
                    </button> -->
                </nav>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow flex flex-col relative w-full h-full p-4 md:p-8 max-w-7xl mx-auto w-full">
        <!-- Iframe to load the specific page -->
        <div class="w-full h-full bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex-grow"
            style="min-height: 80vh;">
            <iframe id="content-frame" src="LaboralMarket.html" class="w-full h-full border-none"
                style="min-height: 80vh;" title="Contenido de gráficos"></iframe>
        </div>

        <!-- Placeholder content for empty tabs -->
        <div id="placeholder"
            class="hidden absolute inset-0 flex items-center justify-center bg-white/90 rounded-2xl shadow-sm border border-slate-200 m-4 md:m-8"
            style="top: 0; left: 0; right: 0; bottom: 0; margin: auto; height: 80vh;">
            <div class="text-center">
                <div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-slate-400" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                    </svg>
                </div>
                <h3 class="text-xl font-medium text-slate-800 mb-2">Página en construcción</h3>
                <p class="text-slate-500 max-w-sm">Los gráficos de esta sección se publicarán próximamente.</p>
            </div>
        </div>
    </main>

    <script>
        function changeTab(tabId) {
            // Update tab styles
            const tabs = ['economia', 'mercado-laboral', 'puestos-demandados'];

            tabs.forEach(id => {
                const tabElement = document.getElementById(`tab-${id}`);
                if (tabElement) {
                    if (id === tabId) {
                        tabElement.classList.remove('tab-inactive');
                        tabElement.classList.add('tab-active');
                    } else {
                        tabElement.classList.remove('tab-active');
                        tabElement.classList.add('tab-inactive');
                    }
                }
            });

            // Update iframe content
            const iframe = document.getElementById('content-frame');
            const placeholder = document.getElementById('placeholder');

            const pageMap = {
                'economia': 'Economia.html',
                'mercado-laboral': 'LaboralMarket.html',
                'puestos-demandados': 'PuestosDemandados.html'
            };

            if (pageMap[tabId]) {
                iframe.src = pageMap[tabId];
                iframe.style.display = 'block';
                placeholder.classList.add('hidden');
            } else {
                iframe.style.display = 'none';
                iframe.src = 'about:blank';
                placeholder.classList.remove('hidden');
            }
        }

        // Ensure starting state is correct
        changeTab('mercado-laboral');
    </script>
</body>

</html>
