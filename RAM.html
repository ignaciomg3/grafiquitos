<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precio 1GB RAM - Evolución</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Aldrich:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Aldrich', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 800;
            letter-spacing: 1px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .title-icon {
            width: 32px;
            height: auto;
            vertical-align: middle;
        }

        .chart-wrapper {
            position: relative;
            width: 100%;
            height: 60vh;
        }

        footer {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.2rem;
            }

            .chart-wrapper {
                height: 50vh;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1><img src="iconos/ram.png" alt="Icono RAM" class="title-icon"> Precio de 1GB de RAM (USD)</h1>
        <div class="chart-wrapper">
            <canvas id="ramChart"></canvas>
        </div>
        <footer>
            Datos históricos 2020 - 2026
        </footer>
    </div>

    <script>
        Chart.defaults.font.family = "'Aldrich', sans-serif";

        const ctx = document.getElementById('ramChart').getContext('2d');

        const gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, "rgba(0, 255, 200, 0.8)");
        gradient.addColorStop(1, "rgba(0, 100, 255, 0.2)");

        const ramChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ["2020", "2021", "2022", "2023", "2024", "2025", "2026"],
                datasets: [{

                    data: [4.50, 5.15, 3.90, 2.60, 3.10, 7.50, 12.50],
                    backgroundColor: gradient,
                    borderColor: "#00FFC6",
                    borderWidth: 3,
                    tension: 0.4,
                    fill: true,
                    pointRadius: 6,
                    pointBackgroundColor: "#ffffff",
                    pointBorderColor: "#00FFC6",
                    pointHoverRadius: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: {
                    duration: 1500,
                    easing: 'easeOutQuart'
                },
                plugins: {
                    legend: {
                        display: false
                    },
                    tooltip: {
                        backgroundColor: "#111",
                        titleColor: "#00FFC6",
                        bodyColor: "#fff",
                        padding: 12,
                        cornerRadius: 10
                    }
                },
                scales: {
                    x: {
                        ticks: {
                            color: "white",
                            font: {
                                size: window.innerWidth < 768 ? 10 : 16
                            }
                        },
                        grid: {
                            color: "rgba(255,255,255,0.1)"
                        }
                    },
                    y: {
                        ticks: {
                            color: "white",
                            font: {
                                size: window.innerWidth < 768 ? 10 : 14
                            }
                        },
                        grid: {
                            color: "rgba(255,255,255,0.1)"
                        }
                    }
                },
                onResize: function (chart, size) {
                    const isMobile = window.innerWidth < 768;
                    chart.options.scales.x.ticks.font.size = isMobile ? 10 : 16;
                    chart.options.scales.y.ticks.font.size = isMobile ? 10 : 14;
                }
            }
        });
    </script>

</body>

</html>
