<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Economía</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 p-4 md:p-12">
    <header class="mb-8 md:mb-12">
        <h1 class="text-3xl font-bold text-slate-800 mb-2">Panorama Económico</h1>
        <p class="text-slate-500">Indicadores clave de la economía global y regional.</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8">
        <section class="bg-white rounded-2xl shadow-sm p-4 md:p-6 border border-slate-100 md:col-span-2">
            <h2 class="text-lg md:text-xl font-bold mb-4">Inflación Mensual Argentina</h2>
            <div class="h-80 w-full">
                <canvas id="chartInflacion"></canvas>
            </div>
        </section>

        <section class="bg-white rounded-2xl shadow-sm p-4 md:p-6 border border-slate-100">
            <h2 class="text-lg md:text-xl font-bold mb-4">Crecimiento del PIB</h2>
            <div class="h-64 w-full">
                <canvas id="chartPib"></canvas>
            </div>
        </section>
    </div>

    <script>
        Chart.defaults.font.family = "'Inter', sans-serif";
        Chart.defaults.color = '#64748b';
        Chart.defaults.plugins.tooltip.backgroundColor = 'rgba(15, 23, 42, 0.95)';
        Chart.defaults.plugins.tooltip.titleFont = { size: 14, weight: 'bold' };
        Chart.defaults.plugins.tooltip.padding = 12;
        Chart.defaults.plugins.tooltip.cornerRadius = 8;
        Chart.defaults.elements.bar.borderRadius = 6;
        Chart.defaults.elements.bar.borderSkipped = false;

        const inflationLabels = [
            'Ene 19', 'Feb 19', 'Mar 19', 'Abr 19', 'May 19', 'Jun 19', 'Jul 19', 'Ago 19', 'Sep 19', 'Oct 19', 'Nov 19', 'Dic 19',
            'Ene 20', 'Feb 20', 'Mar 20', 'Abr 20', 'May 20', 'Jun 20', 'Jul 20', 'Ago 20', 'Sep 20', 'Oct 20', 'Nov 20', 'Dic 20',
            'Ene 21', 'Feb 21', 'Mar 21', 'Abr 21', 'May 21', 'Jun 21', 'Jul 21', 'Ago 21', 'Sep 21', 'Oct 21', 'Nov 21', 'Dic 21',
            'Ene 22', 'Feb 22', 'Mar 22', 'Abr 22', 'May 22', 'Jun 22', 'Jul 22', 'Ago 22', 'Sep 22', 'Oct 22', 'Nov 22', 'Dic 22',
            'Ene 23', 'Feb 23', 'Mar 23', 'Abr 23', 'May 23', 'Jun 23', 'Jul 23', 'Ago 23', 'Sep 23', 'Oct 23', 'Nov 23', 'Dic 23',
            'Ene 24', 'Feb 24', 'Mar 24', 'Abr 24', 'May 24', 'Jun 24', 'Jul 24', 'Ago 24', 'Sep 24', 'Oct 24', 'Nov 24', 'Dic 24',
            'Ene 25', 'Feb 25', 'Mar 25', 'Abr 25', 'May 25', 'Jun 25', 'Jul 25', 'Ago 25', 'Sep 25', 'Oct 25', 'Nov 25', 'Dic 25',
            'Ene 26'
        ];

        const ctxInflacion = document.getElementById('chartInflacion').getContext('2d');
        const gradientInflacion = ctxInflacion.createLinearGradient(0, 0, 0, 400);
        gradientInflacion.addColorStop(0, 'rgba(239, 68, 68, 0.4)');
        gradientInflacion.addColorStop(1, 'rgba(239, 68, 68, 0.05)');

        new Chart(ctxInflacion, {
            type: 'line',
            data: {
                labels: inflationLabels,
                datasets: [{
                    label: 'Inflación Mensual %',
                    data: [
                        2.9, 3.8, 4.7, 3.4, 3.1, 2.7, 2.2, 4.0, 5.9, 3.3, 4.3, 3.7,
                        2.3, 2.0, 3.3, 1.5, 1.5, 2.2, 1.9, 2.7, 2.8, 3.8, 3.2, 4.0,
                        4.0, 3.6, 4.8, 4.1, 3.3, 3.2, 3.0, 2.5, 3.5, 3.5, 2.5, 3.8,
                        3.9, 4.7, 6.7, 6.0, 5.1, 5.3, 7.4, 7.0, 6.2, 6.3, 4.9, 5.1,
                        6.0, 6.6, 7.7, 8.4, 7.8, 6.0, 6.3, 12.4, 12.7, 8.3, 12.8, 25.5,
                        20.6, 13.2, 11.0, 8.8, 4.2, 4.6, 4.0, 4.2, 3.5, 2.7, 2.4, 2.7,
                        2.2, 2.4, 3.7, 2.8, 1.5, 1.6, 1.9, 1.9, 2.1, 2.3, 2.5, 2.8,
                        2.9
                    ],
                    borderColor: '#ef4444',
                    backgroundColor: gradientInflacion,
                    fill: true,
                    tension: 0.3,
                    borderWidth: 2.5,
                    pointBackgroundColor: '#ffffff',
                    pointBorderColor: '#ef4444',
                    pointRadius: 0,
                    pointHoverRadius: 6,
                    pointHitRadius: 10
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        grid: { display: false },
                        ticks: { maxTicksLimit: 12, maxRotation: 45, minRotation: 45 }
                    },
                    y: {
                        grid: { borderDash: [4, 4], color: '#f1f5f9' }
                    }
                },
                plugins: {
                    legend: { display: false }
                },
                interaction: {
                    intersect: false,
                    mode: 'index',
                },
            }
        });

        const ctxPib = document.getElementById('chartPib').getContext('2d');
        const gradientPib = ctxPib.createLinearGradient(0, 0, 0, 400);
        gradientPib.addColorStop(0, '#34d399');
        gradientPib.addColorStop(1, '#059669');

        new Chart(ctxPib, {
            type: 'bar',
            data: {
                labels: ['EE.UU.', 'Eurozona', 'China', 'Japón', 'Latam'],
                datasets: [{
                    label: 'Crecimiento Estimado %',
                    data: [2.1, 0.8, 4.6, 0.9, 1.5],
                    backgroundColor: gradientPib,
                    barPercentage: 0.6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    x: { grid: { display: false } },
                    y: { grid: { borderDash: [4, 4], color: '#f1f5f9' } }
                }
            }
        });
    </script>
</body>

</html>
